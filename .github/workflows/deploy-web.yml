name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/core/**"
      - "packages/seo/**"
      - "packages/config/**"
      - "packages/shared-types/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

jobs:
  deploy:
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID_WEB != '' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate web build
        run: pnpm --filter @linku/web build

      - name: Pull Vercel project settings
        working-directory: apps/web
        run: pnpm dlx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel artifact
        working-directory: apps/web
        run: pnpm dlx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        working-directory: apps/web
        run: pnpm dlx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
